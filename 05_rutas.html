<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rutas</title>
</head>
<body>

    <h1>Explicación: Rutas Absolutas y Relativas</h1>

    <section>
        <h2>Rutas Absolutas</h2>
        <!-- Ruta completa a un recurso en un servidor externo. La ruta es la URL completa del recurso, esta no se modifica segun la ubicacion del archivo actual-->
        <p>
            Para ir a un sitio externo, como el catalogo global de respuestos,
            usamos la URL completa:
            <a href="https://WWW.shimano.com">Visitar Shimano Internacional</a>
        </p>

        <img src="https://WWW.manualweb.net/img/covers/html5-cover.jpg" alt="Imagen HTML desde un seridor externo" width="300"height="200" title="HTML 5">
    </section>

    <hr>

    <section>
        <h2>Rutas Relativas</h2>
        <!-- Ruta relativa a un recurso dentro del mismo proyecto. La ruta se basa en la ubicacion del archivo actual, y se ajusta segun la estructura de carpetas dl proyecto -->
        
        <p>
            Ir a la pagina de <a href="04_inline_inblock.html">Inline vs Block</a>
                <!--Funciona si hay un archivo llamado ´04_inline_inblock.html´ en la misma carpeta -->
        </p>

        <p>
            ver foto de la tecnologia <a href="img/04_Imagen.png">CSS 3</a>
            <!--Funciona si hay una imagen llamada ´04_Imagen.png´ en la carpeta img -->
        </p>
    </section>

</body>
</html>
