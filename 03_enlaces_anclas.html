<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enlaces</title>
</head>
<body>
  <!-- Enlaces o anclas o hipervinculos -->
  <!-- a (anchor) significa ancla. Metafora: como un barco te mantiene en una ubicacion especifica un ancla es justamente para que el usuario sepa hacia donde buscar un recurso o hacia donde navegar en la pagina web. -->
  
  <!-- Los atributos son caracteristicas que definen el comportamiento y la apriencia de los elemntos en este caso el atributo href vuelve funcional a la etiqueta es por esta razon que se utiliza en el maquetado y no en el css dadoque no es una caracteriztica visual. -->
  
  <!-- href (hypertext reference) es la referencia a un recurso, es decir el destino del enlace. -->
  <!-- Lo que esta dentro de la etiqueta a es el texto visible que el usuario verá en la pagina web. Mientras que lo que esta dentro de href es la referencia al recurso al que apunta el enlace. -->
  <h2 title="titulo de la pagina">Enlaces o anclas</h2>
  <!-- Por otra parte, el atributo title proporciona al texto de ayuda que se muestra cuando el usuario pasa el cursor sobre el enlace. las tecnologias de asitencia como lectores de pantalla pueden utilizan este atributo para proporcionar informacion al usuario. En el caso de personas invidentes esto les permite acceder a informacion adicional sobre el enlace. -->
  
  <a href="https://www.google.com">Google</a>
  <br>
  <a href="https://www.facebook.com">Facebook</a>
  <br>
  <a href="https://www.youtube.com">YouTube</a>
  <br>
  <a title="Ir al canal de YouTube" href="https://www.youtube.com/@ramcrack0584">Ramcrack</a>  <!--Mala practica: usar protocolo relativo sin especificar el protocolo.-->
  <br>
  <br>
  <a href="03-1_pagina_enlaces1.html">Ir a enlace uno</a>
  <br>
  <a href="03-2_pagina_enlaces2.html">Ir a enlace dos</a>
  <br> 
  <a href="03-3_pagina_enlaces3.html">Ir a enlace tres</a>
  <!-- Es sumamente importante que en la programacion y el desarrollo web se realicen las practicas a medida que se va avanzando, de esta forma se asegura una mejor comprension y aplicacion de los conceptos aprendidos. Entiendan que la programacion es un proceso activo no pasivo, una cosa es intentar comprender lo que sucede cuando leen o ven algo que se esta haciendo, sin embargo, la unica forma de aprender es probando ustedes mismos todo lo que se debe implementar. -->
  <br>

  <h2>Enlaces con target a otra ventana</h2>
  <a href="03-4_pagina_enlaces4.html" target="_blank">Ir a enlace cuatro en una nueva ventana</a>
  <!-- El atributo target="_blank" abre el enlace en una nueva ventana o pestaña del navegador. por defecto siempre esta en el self que significa que se abre en la misma ventana o pestaña. -->
</body>
</html>
