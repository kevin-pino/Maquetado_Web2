<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrados y encabezados</title>
</head>
<body>
<!-- Titulos o encabezados:
se tienen 6 tipos de encabezados, desde el h1 hasta el h6. -->
<!-- (h$*6) crea 6 titulos en orden del 1 al 6 Emmet -->
    <h1>Titulo</h1>
    <h2>subtitulo</h2>
    <h3>subtitulo</h3>
    <h4>subtitulo</h4>
    <h5>subtitulo</h5>
    <h6>subtitulo</h6>
    <!-- Desde el h2 hasta el h6, se puede utilizar las veces que sean necesarias segun el contenido que se quiera recrear. -->
    
    <!-- Parrado: los parafos deben tener una idea o un punto especifico.
    Cada párrafo escrito debe de contener un concepto, una idea. Es decir, pueden describir una seccion o un elemento, hasta un mensaje en el chat. Por ejemplo en una sección se habla sobre los beneficios del ejercicio:
    un párrafo puede tratar de mejorar la salud cardiovascular y otro puede ser sobre los beneficios y cuidados de la salud mental. Finalmente, debe existir un motivo para que exista un párrafo-->
    <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Perferendis enim alias nisi recusandae beatae et, officiis ad eius omnis iste? Suscipit id iste delectus ea saepe quasi excepturi autem! Rerum.
    </p>
    <!-- (CTRL+SHIFT+P) o (ALT+Z) Ajusta el contenido del párrafo a la ventana del editor  -->
    <!-- Existen algunas tecnologias de asistencia como lectores de pantalla, que ayudan a las personas con discapacidad visual a navegar por el contenido web.
    Por ejemplo: cuando estas tecnologias leen ei hi de la página, entienden de que trata la pagina por el hi. Por temas de accesibilidad web es Importante que se utilice solo un hi por página.-->
</body>
</html>
